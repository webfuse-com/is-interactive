<!DOCTYPE html>
<html>
    <head>
        <meta charset="urf-8">
        <title>Test</title>
        <STYLE>
            .reserve-space {
                position: relative;
                width: 200px;
                height: 150px;
            }
        </STYLE>
    </head>
    <body>
        <header>
            <section H="ariaHidden">
                <div role="toolbar" aria-hidden="true">
                    <div>
                        <button>Click here</button>
                    </div>
                </div>
            </section>
        </header>
        <main>
            <h1>Test</h1>
            <section H="clipped">
                <div style="width: 200px; height: 50px; overflow: hidden;">
                    <button style="margin-left: 300px;">Click here</button>
                </div>
            </section>
            <section H="collapsed" class="reserve-space">
                <div>
                    <button
                        style="position: absolute; margin: 0; padding: 0; width: 0; border: none; outline: none; overflow: hidden;"
                    >Click here</button>
                </div>
            </section>
            <section H="disabled" id="TARGET">
                <disabled-wrapper>
                    <template shadowrootmode="open">
                        <strong>Shadow</strong>
                        <div>
                            <button disabled>Click here</button>
                        </div>
                    </template>
                </disabled-wrapper>
                <fieldset disabled>
                    <button>Click here</button>
                </fieldset>
                <div>
                    <button disabled>Click here</button>
                </div>
            </section>
            <section H="disconnected">
                <div>
                    <button id="to-disconnect">Click here</button>
                    <script>
                        document.querySelector("#to-disconnect").remove();
                    </script>
                </div>
            </section>
            <section H="hidden" class="reserve-space">
                <div>
                    <button hidden>Click here</button>
                </div>
            </section>
            <section H="inert">
                <div inert>
                    <div>
                        <button>Click here</button>
                    </div>
                </div>
            </section>
            <section H="invisible">
                <div style="display: none;">
                    <button>Click here</button>
                </div>
                <div>
                    <button style="visibility: hidden;">Click here</button>
                </div>
                <div>
                    <button style="visibility: hidden;">Click here</button>
                </div>
            </section>
            <section H="occluded">
                <!-- fully -->
                <div>
                    <button
                        style="position: absolute; top: 100px; left: 100px; width: 50px; height: 25px;"
                    >
                        Click here
                    </button>
                    <div
                        style="position: absolute; top: 90px; left: 90px; width: 100px; height: 100px; background-color: lime;"
                    ></div>
                </div>
                <!-- partially -->
                <div>
                    <button
                        style="position: absolute; top: 100px; left: 100px; width: 50px; height: 25px;"
                    >
                        Click here
                    </button>
                    <div
                        style="position: absolute; top: 90px; left: 90px; width: 35px; height: 100px; background-color: aqua;"
                    ></div>
                </div>
            </section>
            <section H="offViewport" class="reserve-space">
                <div>
                    <button
                        style="position: absolute; top: 100px; left: -1000px; width: 50px; height: 25px;"
                    >Click here</button>
                </div>
            </section>
            <section H="unclickable">
                <div>
                    <button style="pointer-events: none;">Click here</button>
                </div>
                <!-- recovered -->
                <div style="pointer-events: none;">
                    <button style="pointer-events: auto;">
                        Click here
                        <span style="pointer-events: none;">!</span>
                    </button>
                </div>
            </section>
        </main>  
        <footer>
            <span>2026</span>
        </footer>
    </body>
</html>
