<html>
    <body>
        <header>
            <section h="ariaHidden"></section>
        </header>
        <main>
            <h1>
                Test
            </h1>
            <section h="clipped">
                <div style="width: 200px; height: 50px; overflow: hidden;"></div>
            </section>
            <section h="collapsed" class="reserve-space"></section>
            <section h="disabled">
                <disabled-wrapper>
                    <template shadowrootmode="open" shadowrootserializable="">
                        <strong>
                            Shadow
                        </strong>
                        <div></div>
                    </template>
                </disabled-wrapper>
                <div></div>
            </section>
            <section h="disconnected">
                <div></div>
            </section>
            <section h="hidden" class="reserve-space">
                <div></div>
            </section>
            <section h="occluded">
                <!-- fully -->
                <div>
                    <div style="position: absolute; top: 90px; left: 90px; width: 100px; height: 100px; background-color: lime;"></div>
                </div>
                <!-- partially -->
                <div>
                    <button style="position: absolute; top: 100px; left: 100px; width: 50px; height: 25px;">
                        Click here
                    </button>
                    <div style="position: absolute; top: 90px; left: 90px; width: 35px; height: 100px; background-color: aqua;"></div>
                </div>
            </section>
        </main>
    </body>
</html>
